<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Glyph Weight Animation</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <a class="home-link" href="../index.html" aria-label="Back to toys">TOYS/</a>

        <main class="stage" aria-label="Animated Lilex glyph weight wave">
            <section class="glyph-field" id="glyphField"></section>
            <div class="gesture-vector" id="gestureVector" aria-hidden="true">
                <span>&gt;</span>
            </div>
        </main>

        <aside class="control-panel" aria-label="Animation controls">
            <div class="mode-grid" id="modeGrid" aria-label="Animation type"></div>
            <label class="speed-control" for="speedControl">
                <span>speed</span>
                <output id="speedValue" for="speedControl">1.0x</output>
                <input
                    id="speedControl"
                    type="range"
                    min="0.2"
                    max="3"
                    step="0.1"
                    value="0.6"
                />
            </label>
            <label class="speed-control" for="forceControl">
                <span>force</span>
                <output id="forceValue" for="forceControl">1.0</output>
                <input
                    id="forceControl"
                    type="range"
                    min="0.2"
                    max="2"
                    step="0.1"
                    value="1"
                />
            </label>
            <label class="speed-control" for="scaleControl">
                <span>scale</span>
                <output id="scaleValue" for="scaleControl">1.0</output>
                <input
                    id="scaleControl"
                    type="range"
                    min="0.5"
                    max="2.5"
                    step="0.1"
                    value="1"
                />
            </label>
            <label class="speed-control" for="softControl">
                <span>soft</span>
                <output id="softValue" for="softControl">1.0</output>
                <input
                    id="softControl"
                    type="range"
                    min="0.3"
                    max="2"
                    step="0.1"
                    value="1"
                />
            </label>
        </aside>

        <script src="script.js"></script>
    </body>
</html>
